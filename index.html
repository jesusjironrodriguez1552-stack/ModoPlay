<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Admin - Fix</title>
    <style>
        /* Mantenemos tu estilo original */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
        .sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:#141414;border-right:1px solid #222;display:flex;flex-direction:column;z-index:100}
        .logo{padding:20px;font-size:20px;font-weight:700;color:#E50914;letter-spacing:2px}
        .nav{flex:1;padding:12px 0}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:#999;cursor:pointer}
        .nav-item:hover,.nav-item.active{background:#1e1e1e;color:#fff}
        .nav-item.active{border-left:3px solid #E50914}
        .main{margin-left:220px;padding:24px;min-height:100vh}
        .page{display:none}.page.active{display:block}
        .card{background:#141414;border:1px solid #222;border-radius:10px;padding:20px;margin-bottom:16px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
        .stat{background:#1e1e1e;border-radius:8px;padding:16px}
        .stat-label{font-size:12px;color:#666;margin-bottom:6px}
        .stat-value{font-size:24px;font-weight:500;color:#fff}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:10px 12px;border-bottom:1px solid #222;color:#666}
        td{padding:10px 12px;border-bottom:1px solid #1a1a1a;color:#ccc}
        .btn-red{background:#E50914;color:#fff;border:none;padding:10px;border-radius:5px;cursor:pointer;width:100%}
    </style>
</head>
<body>

<div id="login-screen" class="sidebar" style="position:relative; width:100%; height:100vh; justify-content:center; align-items:center; border:none; background:#000">
    <div style="background:#141414; padding:40px; border-radius:10px; width:350px; border:1px solid #222">
        <div class="logo" style="text-align:center; padding:0; margin-bottom:20px">NETFLIX</div>
        <input id="admin-user" type="text" value="admin" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #333; color:#fff">
        <input id="admin-pass" type="password" value="netflix2026" style="width:100%; padding:10px; margin-bottom:20px; background:#222; border:1px solid #333; color:#fff">
        <button class="btn-red" onclick="doLogin()">Ingresar</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="sidebar">
        <div class="logo">NETFLIX</div>
        <nav class="nav">
            <div class="nav-item active" onclick="showPage('dashboard',this)">📊 Dashboard</div>
            <div class="nav-item" onclick="showPage('peliculas',this)">🎬 Películas</div>
        </nav>
        <button style="background:none; border:none; color:#666; padding:20px; cursor:pointer" onclick="location.reload()">Cerrar sesión</button>
    </div>

    <div class="main">
        <div id="page-dashboard" class="page active">
            <h2>Dashboard</h2>
            <div class="stats">
                <div class="stat"><div class="stat-label">Total Películas</div><div id="stat-total" class="stat-value">...</div></div>
            </div>
        </div>

        <div id="page-peliculas" class="page">
            <h2>Películas en Base de Datos</h2>
            <div class="card" style="padding:0">
                <table>
                    <thead><tr><th>Título</th><th>URL de Video</th></tr></thead>
                    <tbody id="tbody-peliculas">
                        <tr><td colspan="2" style="text-align:center; padding:40px">Cargando datos de Supabase...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const S_URL = 'https://ngnutcjeuknwiaebduun.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbnV0Y2pldWtud2lhZWJkdXVuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzA2NzMzMSwiZXhwIjoyMDg4NjQzMzMxfQ.fCR9D9ZpMYJJJN7DK84kzq7Aq7qdl7gAvBa_xMZhmv4';

function doLogin(){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPeliculas();
}

function showPage(name, el){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    el.classList.add('active');
}

async function loadPeliculas() {
    try {
        const res = await fetch(`${S_URL}/rest/v1/peliculas?select=titulo,url_video&limit=100`, {
            headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` }
        });
        const data = await res.json();
        
        // Actualizar contador
        document.getElementById('stat-total').textContent = data.length + "+";

        // Llenar tabla
        const tbody = document.getElementById('tbody-peliculas');
        if (data.length > 0) {
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td style="color:#fff; font-weight:500">${p.titulo}</td>
                    <td style="color:#666; font-size:11px">${p.url_video ? p.url_video.substring(0, 50) + '...' : 'Sin URL'}</td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="2">No se encontraron películas.</td></tr>';
        }
    } catch (err) {
        document.getElementById('tbody-peliculas').innerHTML = '<tr><td colspan="2" style="color:red">Error de conexión con Supabase.</td></tr>';
    }
}
</script>
</body>
</html>
