<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reto Culebrita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>RETO CULEBRITA</h1>
        <div id="scoreboard">
            <span id="score-label">Puntos: </span><span id="score">0</span>
        </div>
        <canvas id="snakeCanvas"></canvas>
        <div id="levels-info">
            <p>Nivel 1 (50 pts): Sin premio</p>
            <p>Nivel 2 (100 pts): Perfil HBO</p>
            <p>Nivel 3 (200 pts): Netflix 15 días</p>
        </div>
        <div id="controls">
            <button class="btn-up" onclick="setDir('UP')">▲</button>
            <div class="middle-btns">
                <button onclick="setDir('LEFT')">◀</button>
                <button onclick="setDir('RIGHT')">▶</button>
            </div>
            <button class="btn-down" onclick="setDir('DOWN')">▼</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
